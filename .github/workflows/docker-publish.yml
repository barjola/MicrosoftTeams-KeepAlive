name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for RELEASE keyword
        id: check_release
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $MSG"
          if [[ "$MSG" == RELEASE* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
            echo "Release detected or manual run."
          else
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
            echo "No RELEASE keyword found. Skipping build."
          fi

      - name: Extract version
        if: steps.check_release.outputs.IS_RELEASE == 'true'
        id: vars
        run: |
          # Fetch all tags
          git fetch --tags
          
          # Get the latest tag matching X.Y.Z
          LATEST_TAG=$(git tag -l "[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -n1)
          
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="0.0.1"
          else
            # Split version into parts
            IFS='.' read -r major minor patch <<< "$LATEST_TAG"
            # Increment patch
            NEW_PATCH=$((patch + 1))
            NEW_VERSION="$major.$minor.$NEW_PATCH"
          fi
          
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Latest tag was: $LATEST_TAG"
          echo "New version: $NEW_VERSION"

      - name: Set up QEMU
        if: steps.check_release.outputs.IS_RELEASE == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: steps.check_release.outputs.IS_RELEASE == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_release.outputs.IS_RELEASE == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check_release.outputs.IS_RELEASE == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microsoft-teams-keepalive:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microsoft-teams-keepalive:${{ steps.vars.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Create GitHub Release
        if: steps.check_release.outputs.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.VERSION }}
          name: Release ${{ steps.vars.outputs.VERSION }}
          body: |
            Automatic release from commit: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
